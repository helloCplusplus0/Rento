name: Legacy Rollback Container Image

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clarify legacy boundary
        run: |
          echo "This workflow only maintains rollback-only container assets."
          echo "Formal deployment stays on Caddy + systemd + Hono + PostgreSQL."

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push rollback-only Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate legacy deployment artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p legacy-deployment
          cp docker-compose.yml legacy-deployment/
          cp .env.example legacy-deployment/.env.template
          echo "IMAGE_TAG=${{ steps.meta.outputs.tags }}" >> legacy-deployment/.env.template
          cat <<'EOF' > legacy-deployment/ROLLBACK_ONLY.txt
          This artifact is rollback-only.
          Do not use it as the formal deployment entry for Rento-miniX.
          The formal deployment path is the GitHub release deploy bundle that
          runs on Caddy + systemd + Hono + PostgreSQL.
          EOF

      - name: Upload legacy deployment artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: legacy-deployment-files
          path: legacy-deployment/
