name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint

  build-test:
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build minix application
        run: npm run build:minix

      - name: Check formal build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi

          if [ ! -d "build/minix-server" ]; then
            echo "Build failed: build/minix-server directory not found"
            exit 1
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "Build failed: dist/index.html not found"
            exit 1
          fi

          if [ ! -f "build/minix-server/index.mjs" ]; then
            echo "Build failed: build/minix-server/index.mjs not found"
            exit 1
          fi

          echo "Formal build artifacts are ready"
