name: Release Formal Deploy Bundle

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: New formal release tag to create from the selected ref, e.g. v1.2.3
        required: true
        type: string

concurrency:
  group: release-deploy-bundle-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release_meta
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_SHA: ${{ github.sha }}
          REF_TYPE: ${{ github.ref_type }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TAG="$INPUT_RELEASE_TAG"
            BUILD_REF="$REF_SHA"
            RELEASE_CHANNEL="formal"
            IS_PRERELEASE="false"
          elif [ "$REF_TYPE" = "tag" ]; then
            RELEASE_TAG="$REF_NAME"
            BUILD_REF="$REF_SHA"
            RELEASE_CHANNEL="formal"
            IS_PRERELEASE="false"
          else
            SHORT_SHA="$(printf '%s' "$REF_SHA" | cut -c1-12)"
            RELEASE_TAG="pre-main-${SHORT_SHA}"
            BUILD_REF="$REF_SHA"
            RELEASE_CHANNEL="prerelease"
            IS_PRERELEASE="true"
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "release tag is required"
            exit 1
          fi

          if [ "$RELEASE_CHANNEL" = "formal" ] && [[ "$RELEASE_TAG" != v* ]]; then
            RELEASE_TAG="v$RELEASE_TAG"
          fi

          VERSION="${RELEASE_TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "release version is required"
            exit 1
          fi

          ASSET_NAME="rento-minix-${VERSION}-deploy-bundle.tar.gz"
          CHECKSUM_NAME="${ASSET_NAME}.sha256"

          {
            echo "release_tag=$RELEASE_TAG"
            echo "build_ref=$BUILD_REF"
            echo "version=$VERSION"
            echo "asset_name=$ASSET_NAME"
            echo "checksum_name=$CHECKSUM_NAME"
            echo "release_channel=$RELEASE_CHANNEL"
            echo "is_prerelease=$IS_PRERELEASE"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository at build ref
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_meta.outputs.build_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build minix release
        run: npm run build:minix

      - name: Verify formal build artifacts
        run: |
          test -f dist/index.html
          test -f build/minix-server/index.mjs

      - name: Prune dev dependencies for deploy bundle
        env:
          NODE_ENV: production
        run: npm prune --omit=dev

      - name: Assemble formal deploy bundle
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          VERSION: ${{ steps.release_meta.outputs.version }}
          BUILD_REF: ${{ steps.release_meta.outputs.build_ref }}
        run: |
          STAGE_ROOT="$RUNNER_TEMP/deploy-stage"
          APP_ROOT="$STAGE_ROOT/rento-minix"

          rm -rf "$STAGE_ROOT"
          mkdir -p "$APP_ROOT/scripts"

          cp -a dist "$APP_ROOT/dist"
          cp -a build "$APP_ROOT/build"
          cp -a deploy "$APP_ROOT/deploy"
          cp -a prisma "$APP_ROOT/prisma"
          cp -a node_modules "$APP_ROOT/node_modules"

          cp package.json "$APP_ROOT/package.json"
          cp package-lock.json "$APP_ROOT/package-lock.json"
          cp .env.example "$APP_ROOT/.env.example"
          cp README.md "$APP_ROOT/README.md"
          cp DEPLOYMENT.md "$APP_ROOT/DEPLOYMENT.md"
          cp DEPLOY_RUNBOOK.md "$APP_ROOT/DEPLOY_RUNBOOK.md"

          cp scripts/start-minix.mjs "$APP_ROOT/scripts/start-minix.mjs"
          cp scripts/health-check.sh "$APP_ROOT/scripts/health-check.sh"
          cp scripts/migrate-and-seed.sh "$APP_ROOT/scripts/migrate-and-seed.sh"
          cp scripts/prepare-release-host.sh "$APP_ROOT/scripts/prepare-release-host.sh"
          cp scripts/deploy-release-on-server.sh "$APP_ROOT/scripts/deploy-release-on-server.sh"
          cp scripts/pull-release-deploy-bundle.sh "$APP_ROOT/scripts/pull-release-deploy-bundle.sh"

          chmod +x \
            "$APP_ROOT/scripts/health-check.sh" \
            "$APP_ROOT/scripts/migrate-and-seed.sh" \
            "$APP_ROOT/scripts/prepare-release-host.sh" \
            "$APP_ROOT/scripts/deploy-release-on-server.sh" \
            "$APP_ROOT/scripts/pull-release-deploy-bundle.sh"

          cat <<EOF > "$APP_ROOT/DEPLOY_BUNDLE_MANIFEST.txt"
          release_tag=${RELEASE_TAG}
          version=${VERSION}
          build_ref=${BUILD_REF}
          formal_runtime=Caddy + systemd + Hono + PostgreSQL
          included_paths=
          - dist/
          - build/minix-server/
          - deploy/
          - prisma/
          - node_modules/
          - package.json
          - package-lock.json
          - .env.example
          - README.md
          - DEPLOYMENT.md
          - DEPLOY_RUNBOOK.md
          - scripts/start-minix.mjs
          - scripts/health-check.sh
          - scripts/migrate-and-seed.sh
          - scripts/prepare-release-host.sh
          - scripts/deploy-release-on-server.sh
          - scripts/pull-release-deploy-bundle.sh
          EOF

      - name: Archive formal deploy bundle
        env:
          ASSET_NAME: ${{ steps.release_meta.outputs.asset_name }}
          CHECKSUM_NAME: ${{ steps.release_meta.outputs.checksum_name }}
        run: |
          STAGE_ROOT="$RUNNER_TEMP/deploy-stage"
          tar -C "$STAGE_ROOT" -czf "$ASSET_NAME" rento-minix
          sha256sum "$ASSET_NAME" > "$CHECKSUM_NAME"

      - name: Upload formal deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: formal-deploy-bundle-${{ steps.release_meta.outputs.release_tag }}
          path: |
            ${{ steps.release_meta.outputs.asset_name }}
            ${{ steps.release_meta.outputs.checksum_name }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release and publish assets
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          BUILD_REF: ${{ steps.release_meta.outputs.build_ref }}
          ASSET_NAME: ${{ steps.release_meta.outputs.asset_name }}
          CHECKSUM_NAME: ${{ steps.release_meta.outputs.checksum_name }}
          RELEASE_CHANNEL: ${{ steps.release_meta.outputs.release_channel }}
          IS_PRERELEASE: ${{ steps.release_meta.outputs.is_prerelease }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            RELEASE_TITLE="${RELEASE_TAG}"
            RELEASE_NOTES="Auto-generated prerelease deploy bundle from main. Built from ${BUILD_REF} for Caddy + systemd + Hono + PostgreSQL."
          else
            RELEASE_TITLE="${RELEASE_TAG}"
            RELEASE_NOTES="Formal deploy bundle for Caddy + systemd + Hono + PostgreSQL. Built from ${BUILD_REF}."
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag ${RELEASE_TAG} already exists on origin. Use a new release_tag or push that tag directly."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release ${RELEASE_TAG} already exists. Use a new release_tag to keep deploy bundles immutable."
            exit 1
          fi

          RELEASE_ARGS=(
            "$RELEASE_TAG"
            "$ASSET_NAME"
            "$CHECKSUM_NAME"
            --target "$BUILD_REF"
            --title "$RELEASE_TITLE"
            --notes "$RELEASE_NOTES"
          )

          if [ "$IS_PRERELEASE" = "true" ]; then
            RELEASE_ARGS+=(--prerelease --latest=false)
          fi

          gh release create "${RELEASE_ARGS[@]}"
