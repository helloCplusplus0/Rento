services:
  app:
    image: ${APP_IMAGE:-ghcr.io/hellocplusplus0/rento@sha256:9ae214a2ebe776ddf68ed80b61193b4139ee2ff7eb41994a51a4b755440e3abd}
    container_name: ${CONTAINER_PREFIX:-rento}-app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${APP_INTERNAL_PORT:-3001}
      APP_INTERNAL_PORT: ${APP_INTERNAL_PORT:-3001}
      MINIX_SERVER_PORT: ${APP_INTERNAL_PORT:-3001}
      DATABASE_URL: ${CONTAINER_DATABASE_URL}
      BACKUP_DIR: ${CONTAINER_BACKUP_DIR:-/app/backups}
      LOG_DIR: ${CONTAINER_LOG_DIR:-/app/logs}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      REDIS_URL: ${CONTAINER_REDIS_URL:-redis://redis:6379}
      ENABLE_MONITORING: ${ENABLE_MONITORING:-true}
      PERFORMANCE_MONITORING: ${PERFORMANCE_MONITORING:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      CORS_ENABLED: ${CORS_ENABLED:-true}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-10485760}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30000}
    volumes:
      - ${HOST_BACKUP_DIR:-./backups}:/app/backups
      - ${HOST_LOG_DIR:-./logs}:/app/logs
    expose:
      - '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rento-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://localhost:3001/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-rento}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rento_production}
      POSTGRES_USER: ${POSTGRES_USER:-rento}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${HOST_BACKUP_DIR:-./backups}:/backups
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-rento} -d ${POSTGRES_DB:-rento_production}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - rento-network
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=50
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=32MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c default_statistics_target=100

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: ${CONTAINER_PREFIX:-rento}-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - rento-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: docker.io/library/nginx:1.27-alpine
    container_name: ${CONTAINER_PREFIX:-rento}-nginx
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_SSL_DIR:-./nginx/ssl}:/etc/nginx/ssl:ro
      - ${HOST_NGINX_LOG_DIR:-./logs/nginx}:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rento-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  rento-network:
    driver: bridge
